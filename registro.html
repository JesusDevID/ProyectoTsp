<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Crear cuenta — Tech Z</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
<body class="auth-page"><header class="site-header"><nav class="nav container"><a class="brand" href="index.html"><span class="brand-mark">Z</span><span>Tech Z</span></a><a class="nav-link" href="index.html">← Volver a la tienda</a></nav></header><main class="auth-main"><section class="auth-card"><span class="eyebrow">ÚNETE A TECH Z</span><h1>Crea tu cuenta</h1><p class="auth-intro">Solo toma un momento. Tus datos se guardan localmente en este prototipo.</p><form id="register-form" novalidate><label>Nombre completo<input type="text" id="nombre" autocomplete="name" placeholder="Tu nombre" required><small class="field-error"></small></label><label>Correo electrónico<input type="email" id="correo" autocomplete="email" placeholder="tu@correo.com" required><small class="field-error"></small></label><label>Contraseña<input type="password" id="password" autocomplete="new-password" placeholder="Mínimo 6 caracteres" minlength="6" required><small class="field-error"></small></label><p id="form-error" class="form-error" role="alert"></p><button class="primary-button full" type="submit">Crear cuenta <span>→</span></button></form><p class="auth-switch">¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a></p></section></main><div id="toast" class="toast" role="status" aria-live="polite"></div><script src="js/store.js"></script><script src="js/auth.js"></script></body></html>
